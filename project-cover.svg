<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#062017"/>
    <stop offset="100%" stop-color="#0f3d2e"/>
  </linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25"/></filter>
</defs>
<rect width="1600" height="720" fill="url(#bg)"/>
<circle cx="1390" cy="90" r="240" fill="#ffffff" opacity="0.04"/>
<circle cx="180" cy="670" r="260" fill="#34d399" opacity="0.08"/>
<text x="110" y="115" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="24" font-weight="700">AUTOMATION PORTFOLIO SERIES · PROJECT 02</text>
<text x="110" y="205" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="700">Personal Finance Tracker</text>
<text x="110" y="260" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">One Telegram bot, four input types, one AI expense pipeline</text>

<g filter="url(#shadow)" font-family="Arial, sans-serif">
  <rect x="110" y="350" rx="18" width="230" height="110" fill="#ffffff"/>
  <text x="225" y="395" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">Text / Photo</text>
  <text x="225" y="430" text-anchor="middle" fill="#475569" font-size="16">Doc · Voice</text>

  <rect x="480" y="350" rx="18" width="230" height="110" fill="#ffffff"/>
  <text x="595" y="395" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">n8n Pipeline</text>
  <text x="595" y="430" text-anchor="middle" fill="#475569" font-size="16">Route · Merge · Parse</text>

  <rect x="850" y="350" rx="18" width="230" height="110" fill="#ffffff"/>
  <text x="965" y="395" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">AI Layer</text>
  <text x="965" y="430" text-anchor="middle" fill="#475569" font-size="16">Gemini · Whisper</text>

  <rect x="1220" y="350" rx="18" width="270" height="110" fill="#ffffff"/>
  <text x="1355" y="395" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">Sheets + Report</text>
  <text x="1355" y="430" text-anchor="middle" fill="#475569" font-size="16">Log · Monthly summary</text>

  <path d="M340 405 L480 405" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M710 405 L850 405" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1080 405 L1220 405" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
</g>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
  </marker>
</defs>
</svg>
