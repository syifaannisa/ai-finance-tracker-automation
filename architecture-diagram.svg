<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
  </marker>
</defs>
<rect width="1600" height="900" fill="#f8fafc"/>
<text x="60" y="60" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Personal Finance Tracker — Architecture</text>

<!-- Telegram trigger -->
<rect x="60" y="120" rx="14" width="220" height="80" fill="#0f172a"/>
<text x="170" y="165" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="18" font-weight="700">Telegram Trigger</text>

<!-- Router -->
<rect x="360" y="120" rx="14" width="220" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="470" y="155" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="16" font-weight="700">Input Type Router</text>
<text x="470" y="178" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="13">text / photo / doc / voice</text>

<path d="M280 160 L360 160" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>

<!-- Four branches -->
<rect x="700" y="40" rx="12" width="240" height="60" fill="#dbeafe" stroke="#3b82f6"/>
<text x="820" y="75" text-anchor="middle" fill="#1e3a8a" font-family="Arial" font-size="15" font-weight="700">Prepare Text Input</text>

<rect x="700" y="120" rx="12" width="240" height="60" fill="#dcfce7" stroke="#22c55e"/>
<text x="820" y="155" text-anchor="middle" fill="#14532d" font-family="Arial" font-size="15" font-weight="700">Photo → Build Image URL</text>

<rect x="700" y="200" rx="12" width="240" height="60" fill="#fef3c7" stroke="#f59e0b"/>
<text x="820" y="235" text-anchor="middle" fill="#78350f" font-family="Arial" font-size="15" font-weight="700">Document → Build Doc URL</text>

<rect x="700" y="280" rx="12" width="240" height="60" fill="#fce7f3" stroke="#ec4899"/>
<text x="820" y="315" text-anchor="middle" fill="#831843" font-family="Arial" font-size="14" font-weight="700">Voice → Download → Whisper</text>

<path d="M580 140 L700 70" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<path d="M580 155 L700 150" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<path d="M580 170 L700 230" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<path d="M580 185 L700 305" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- Merge -->
<rect x="1020" y="150" rx="14" width="220" height="80" fill="#0f172a"/>
<text x="1130" y="185" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="16" font-weight="700">Merge All Inputs</text>
<text x="1130" y="205" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="12">→ Build Gemini Prompt</text>

<path d="M940 70 L1020 165" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<path d="M940 150 L1020 175" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<path d="M940 230 L1020 195" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<path d="M940 310 L1020 210" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- Gemini -->
<rect x="1320" y="150" rx="14" width="220" height="80" fill="#4285F4"/>
<text x="1430" y="185" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="16" font-weight="700">AI Receipt Reader</text>
<text x="1430" y="205" text-anchor="middle" fill="#e0f2fe" font-family="Arial" font-size="12">Google Gemini 2.5 Flash</text>
<path d="M1240 190 L1320 190" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>

<!-- Parse -->
<rect x="1220" y="290" rx="14" width="220" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="1330" y="330" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="16" font-weight="700">Parse AI Response</text>
<path d="M1430 230 L1330 290" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- Success branch -->
<rect x="1220" y="400" rx="14" width="100" height="60" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="1270" y="435" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="14" font-weight="700">Success?</text>
<path d="M1330 360 L1270 400" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<rect x="1000" y="500" rx="12" width="260" height="60" fill="#dcfce7" stroke="#22c55e"/>
<text x="1130" y="535" text-anchor="middle" fill="#14532d" font-family="Arial" font-size="15" font-weight="700">Auto-Save to Spreadsheet</text>
<path d="M1230 440 L1150 500" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

<rect x="1000" y="600" rx="12" width="260" height="60" fill="#dbeafe" stroke="#3b82f6"/>
<text x="1130" y="635" text-anchor="middle" fill="#1e3a8a" font-family="Arial" font-size="15" font-weight="700">Telegram: Success Confirmation</text>
<path d="M1130 560 L1130 600" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

<rect x="1320" y="600" rx="12" width="220" height="60" fill="#fee2e2" stroke="#ef4444"/>
<text x="1430" y="635" text-anchor="middle" fill="#7f1d1d" font-family="Arial" font-size="15" font-weight="700">Telegram: Error Message</text>
<path d="M1300 440 L1430 600" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>

<!-- Reporting flow -->
<rect x="60" y="740" rx="14" width="240" height="70" fill="#0f172a"/>
<text x="180" y="770" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="15" font-weight="700">Monthly Report Schedule</text>
<text x="180" y="792" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="12">Schedule Trigger</text>

<rect x="380" y="740" rx="14" width="220" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="490" y="780" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="15" font-weight="700">Read Sheets Data</text>
<path d="M300 775 L380 775" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<rect x="680" y="740" rx="14" width="240" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="800" y="780" text-anchor="middle" fill="#0f172a" font-family="Arial" font-size="15" font-weight="700">Calculate Monthly Report</text>
<path d="M600 775 L680 775" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<rect x="1000" y="740" rx="14" width="220" height="70" fill="#dbeafe" stroke="#3b82f6"/>
<text x="1110" y="780" text-anchor="middle" fill="#1e3a8a" font-family="Arial" font-size="15" font-weight="700">Telegram: Send Report</text>
<path d="M920 775 L1000 775" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
</svg>
